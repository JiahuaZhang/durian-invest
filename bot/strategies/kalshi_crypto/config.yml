# ─── Kalshi Crypto 15-min Prediction Bot ─────────────────────────────────────
#
# Series names — verify each against the Kalshi API before enabling.
# BTC confirmed: KXBTC15M
# Others (KXETH, KXSOL, etc.) may also need a "15M" suffix — check before enabling.
#
# ADA (KXADA) skipped — Kalshi series returns 404.
#
# Required .env entries:
#   KALSHI_API_KEY_ID
#   KALSHI_PRIVATE_KEY
#   (SUPABASE_URL, SUPABASE_SERVICE_KEY, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID — from common.yml)

name: kalshi-crypto

kalshi:
  api-key-id: ${KALSHI_API_KEY_ID}
  private-key: ${KALSHI_PRIVATE_KEY}
  dry-run: true          # flip to false for live trading

# Poll every 30 seconds — strategies depend on candle age within the 15-min window
scan-interval-seconds: 30

# ─── Asset configurations ─────────────────────────────────────────────────────
# Set enabled: true to activate an asset. Disabled assets are ignored at startup.
assets:

  - id: btc
    series: KXBTC15M
    enabled: true
    scalp:
      entry-price: 0.92
      target-price: 0.97
      stop-price: 0.88
      min-minutes-remaining: 2.0
      max-bet-usd: 10.0
      kelly-fraction: 0.25
    reversal:
      entry-price: 0.02
      vol-threshold: 0.0015     # BTC 1-min return std dev
      max-concurrent: 5
      size-usd: 10.0
    market-maker:
      entry-price: 0.49
      window-seconds: 60
      cancel-after-seconds: 30
      max-combined-cost: 0.98
      size-usd: 50.0
      max-bankroll-pct: 0.15

  - id: eth
    series: KXETH          # verify series name before enabling
    enabled: false
    scalp:
      entry-price: 0.92
      target-price: 0.97
      stop-price: 0.88
      min-minutes-remaining: 2.0
      max-bet-usd: 5.0          # smaller caps for higher-vol assets
      kelly-fraction: 0.25
    reversal:
      entry-price: 0.02
      vol-threshold: 0.002      # ETH ~30% more volatile than BTC
      max-concurrent: 3
      size-usd: 5.0
    market-maker:
      entry-price: 0.49
      window-seconds: 60
      cancel-after-seconds: 30
      max-combined-cost: 0.98
      size-usd: 25.0
      max-bankroll-pct: 0.10

