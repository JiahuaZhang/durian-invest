# Kalshi BTC 15-min scalp bot
#
# Strategy: buy YES when ask ≤ entry-cents, limit sell at target-cents.
# No external price feeds — Kalshi orderbook only.
#
# Required .env:
#   KALSHI_API_KEY_ID, KALSHI_PRIVATE_KEY
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: kalshi-crypto

kalshi:
  api-key-id: ${KALSHI_API_KEY_ID}
  private-key: ${KALSHI_PRIVATE_KEY}
  dry-run: true   # set to false for live trading

series: KXBTC15M
scan-interval-seconds: 30

scalp:
  entry-cents: 92       # buy YES when ask ≤ this
  target-cents: 97      # place limit sell at this price
  contracts: 1          # contracts per trade
  min-mins-left: 1.0    # skip markets closing in < 1 minutes
