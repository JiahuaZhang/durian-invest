# ─── Common config shared by all strategies ──────────────────────────────────
#
# Secrets are referenced via ${ENV_VAR} — keep actual values in .env, never here.
# A strategy's own config.yml can override any section here.
#
# Required .env entries:
#   ALPACA_API_KEY
#   ALPACA_SECRET_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

alpaca:
  api-key: ${ALPACA_API_KEY}
  secret-key: ${ALPACA_SECRET_KEY}
  paper: true              # all strategies run in paper mode by default

supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}

telegram:
  token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

kalshi:
  api-key-id: ${KALSHI_API_KEY_ID}
  private-key: ${KALSHI_PRIVATE_KEY}
  demo-api-key-id: ${KALSHI_DEMO_KEY_ID}
  demo-private-key: ${KALSHI_DEMO_PRIVATE_KEY}