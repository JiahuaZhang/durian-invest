# Kalshi BTC 15-min orderbook imbalance bot
#
# Strategy: follow conviction — measure dollar-weighted order book
# imbalance and trade in the direction of the heavier side once
# both spreads are tight enough.
#
# Required .env:
#   KALSHI_API_KEY_ID, KALSHI_PRIVATE_KEY
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: kalshi-crypto
enabled: true

kalshi:
  use-demo: false
  # Credentials are loaded from .env automatically based on use-demo:
  #   use-demo: false  →  KALSHI_API_KEY_ID + KALSHI_PRIVATE_KEY       (production)
  #   use-demo: true   →  KALSHI_DEMO_KEY_ID + KALSHI_DEMO_PRIVATE_KEY (demo.kalshi.co)

series: KXBTC15M
scan-interval-seconds: 2

strategy:
  spread: 0.05           # max acceptable spread — skip when wider (book still forming)
  imbalance: 0.80        # min |imbalance()| to flag a signal (0–1 scale)
  count: 1               # contracts per trade
  subaccount: 0          # 0 = primary account; 1-32 = subaccount number