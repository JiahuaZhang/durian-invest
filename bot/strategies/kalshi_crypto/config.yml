# Kalshi BTC 15-min scalp bot
#
# Strategy: buy YES when ask ≤ entry-cents, limit sell at target-cents.
# No external price feeds — Kalshi orderbook only.
#
# Required .env:
#   KALSHI_API_KEY_ID, KALSHI_PRIVATE_KEY
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: kalshi-crypto

kalshi:
  use-demo: true
  # Credentials are loaded from .env automatically based on use-demo:
  #   use-demo: false  →  KALSHI_API_KEY_ID + KALSHI_PRIVATE_KEY       (production)
  #   use-demo: true   →  KALSHI_DEMO_KEY_ID + KALSHI_DEMO_PRIVATE_KEY (demo.kalshi.co)

series: KXBTC15M
scan-interval-seconds: 2

scalp:
  floor-cents: 85       # only enter when ask ≥ this (avoids low-prob markets)
  entry-cents: 92       # only enter when ask ≤ this (the "92¢ conviction zone")
  target-cents: 97      # place resting limit sell at this price
  stop-loss-cents: 88   # exit if bid drops to or below this after entry
  contracts: 1          # contracts per trade
