# Polymarket BTC 5-min price divergence + orderbook imbalance bot
#
# Strategy: exploit Chainlink feed lag vs Binance/Coinbase,
# confirmed by Polymarket orderbook imbalance.
# Source: LunarResearcher article
#
# Required .env:
#   PRIVATE_KEY, CLOB_API_KEY, CLOB_SECRET, CLOB_PASS_PHRASE

name: polymarket-btc-5m
enabled: true

polymarket:
  private-key: ${POLYMARKET_PRIVATE_KEY}
  address: ${POLYMARKET_ADDRESS}

proxy:
  # false = never proxy, true = always proxy on local, auto = use proxy on local when port is open
  enabled: auto
  host: 127.0.0.1
  port: 9090

contract:
  crypto: btc
  interval-minutes: 5

feeds:
  binance-symbol: btcusdt
  coinbase-product: BTC-USD
  chainlink-feed-id: "0x00039d9e45394f473ab1f050a1b963e6b05351e52d71e507509ada0c95ed75b8"
  chainlink-poll-seconds: 1

signals:
  divergence-threshold: 50     # USD gap required
  imbalance-bullish: 1.8       # ratio above this = bullish
  imbalance-bearish: 0.55      # ratio below this = bearish
  imbalance-levels: 10         # top N price levels to sum

exit:
  take-profit: 0.75            # sell shares when price hits this
  stop-loss: 0.35              # sell shares when price drops to this
